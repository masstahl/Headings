<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Field Heading Lookup</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --border: #2a2d3e;
    --accent: #4ade80;
    --accent2: #22d3ee;
    --text: #e2e8f0;
    --muted: #64748b;
    --highlight: #1e3a2f;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
    padding: 24px 16px;
  }

  header {
    text-align: center;
    margin-bottom: 28px;
  }

  header h1 {
    font-size: 1.5rem;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  header p {
    color: var(--muted);
    font-size: 0.82rem;
    margin-top: 4px;
    font-family: 'IBM Plex Mono', monospace;
  }

  .search-wrap {
    max-width: 640px;
    margin: 0 auto 20px;
    position: relative;
  }

  #search {
    width: 100%;
    background: var(--surface);
    border: 1.5px solid var(--border);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 1.1rem;
    padding: 14px 48px 14px 16px;
    border-radius: 8px;
    outline: none;
    transition: border-color 0.2s;
  }

  #search:focus {
    border-color: var(--accent);
  }

  #search::placeholder { color: var(--muted); }

  .clear-btn {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--muted);
    font-size: 1.2rem;
    cursor: pointer;
    display: none;
    line-height: 1;
    padding: 4px;
  }

  .clear-btn:hover { color: var(--text); }

  .stats {
    max-width: 640px;
    margin: 0 auto 12px;
    font-size: 0.78rem;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    padding: 0 2px;
  }

  .results {
    max-width: 640px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 4px 12px;
    align-items: center;
    cursor: default;
    transition: border-color 0.15s, background 0.15s;
  }

  .card:hover {
    border-color: var(--accent);
    background: #1e2330;
  }

  .field-name {
    font-weight: 600;
    font-size: 1rem;
    color: var(--text);
    grid-column: 1;
    grid-row: 1;
  }

  .field-name mark {
    background: var(--highlight);
    color: var(--accent);
    border-radius: 2px;
    padding: 0 1px;
  }

  .field-date {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    grid-column: 1;
    grid-row: 2;
  }

  .heading-badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 1.3rem;
    font-weight: 600;
    color: var(--accent2);
    grid-column: 2;
    grid-row: 1 / 3;
    text-align: right;
    white-space: nowrap;
  }

  .heading-badge span {
    font-size: 0.65rem;
    color: var(--muted);
    display: block;
    text-align: right;
    margin-top: 2px;
    font-weight: 400;
  }

  .no-results {
    text-align: center;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.9rem;
    padding: 40px 0;
  }

  .empty-state {
    text-align: center;
    color: var(--muted);
    font-size: 0.85rem;
    padding: 40px 0;
    line-height: 1.8;
  }

  .empty-state strong {
    display: block;
    font-size: 2rem;
    margin-bottom: 8px;
    opacity: 0.3;
  }

  /* Compass indicator */
  .compass {
    display: inline-block;
    width: 20px;
    height: 20px;
    position: relative;
    vertical-align: middle;
    margin-left: 4px;
    opacity: 0.7;
  }

  .compass svg {
    width: 100%;
    height: 100%;
  }
</style>
</head>
<body>

<header>
  <h1>🌱 Field Heading Lookup</h1>

</header>

<div class="search-wrap">

  <button class="clear-btn" id="clearBtn" title="Clear search">✕</button>
</div>

<div class="stats" id="stats"></div>
<div class="results" id="results"></div>

const searchEl = document.getElementById('search');
const resultsEl = document.getElementById('results');
const statsEl = document.getElementById('stats');
const clearBtn = document.getElementById('clearBtn');

function highlight(text, query) {
  if (!query) return text;
  const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp(escaped, 'gi'), m => `<mark>${m}</mark>`);
}

function directionLabel(deg) {
  const n = parseFloat(deg);
  if (isNaN(n)) return '';
  const dirs = ['N','NE','E','SE','S','SW','W','NW'];
  return dirs[Math.round(n / 45) % 8];
}

function render(query) {
  const q = query.trim().toLowerCase();
  clearBtn.style.display = q ? 'block' : 'none';

  if (!q) {
    resultsEl.innerHTML = '';
    statsEl.textContent = '';
    resultsEl.innerHTML = `<div class="empty-state"><strong>🌾</strong>Start typing a field name to find its previous heading.</div>`;
    return;
  }

  const matches = DATA.filter(d => d.field_name.toLowerCase().includes(q));

  statsEl.textContent = matches.length
    ? `${matches.length} field${matches.length !== 1 ? 's' : ''} found`
    : '';

  if (!matches.length) {
    resultsEl.innerHTML = `<div class="no-results">No fields match "${query}"</div>`;
    return;
  }

  resultsEl.innerHTML = matches.map(d => {
    const hlName = highlight(d.field_name, query);
    const dir = directionLabel(d.heading);
    const dateStr = d.date ? d.date : '—';
    const headingDisplay = d.heading === '0' || d.heading === 0 ? '0°' : d.heading ? d.heading + (isNaN(parseFloat(d.heading)) ? '' : '°') : '—';
    return `
      <div class="card">
        <div class="field-name">${hlName}</div>
        <div class="field-date">${dateStr}</div>
        <div class="heading-badge">${headingDisplay}<span>${dir}</span></div>
      </div>`;
  }).join('');
}

searchEl.addEventListener('input', e => render(e.target.value));
clearBtn.addEventListener('click', () => { searchEl.value = ''; searchEl.focus(); render(''); });

render('');
</script>
