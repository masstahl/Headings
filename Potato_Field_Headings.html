<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Field Heading Lookup</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #f7f4ee;
    --surface:  #ffffff;
    --border:   #ddd8cc;
    --accent:   #2d5a27;
    --accent2:  #c8a84b;
    --danger:   #b94040;
    --text:     #1a1a18;
    --muted:    #8a8678;
    --tag-bg:   #e8f0e5;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }

  /* ── Header ── */
  .header {
    background: var(--accent);
    padding: 18px 20px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }

  .header-left h1 {
    font-size: 1.05rem;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.02em;
  }

  .header-left p {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: rgba(255,255,255,0.6);
    margin-top: 2px;
  }

  .add-btn {
    background: var(--accent2);
    color: #1a1a18;
    border: none;
    border-radius: 6px;
    padding: 8px 14px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 0.85rem;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
    transition: opacity 0.15s;
  }
  .add-btn:hover { opacity: 0.85; }

  /* ── Search ── */
  .search-section {
    padding: 16px 16px 0;
    max-width: 680px;
    margin: 0 auto;
  }

  .search-wrap {
    position: relative;
  }

  #search {
    width: 100%;
    background: var(--surface);
    border: 1.5px solid var(--border);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    padding: 12px 44px 12px 14px;
    border-radius: 8px;
    outline: none;
    transition: border-color 0.2s;
  }
  #search:focus { border-color: var(--accent); }
  #search::placeholder { color: var(--muted); }

  .clear-btn {
    position: absolute; right: 12px; top: 50%;
    transform: translateY(-50%);
    background: none; border: none;
    color: var(--muted); font-size: 1.1rem;
    cursor: pointer; display: none; padding: 4px;
  }
  .clear-btn:hover { color: var(--text); }

  .stats {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
    margin-top: 8px;
    padding: 0 2px;
    min-height: 16px;
  }

  /* ── Results ── */
  .results {
    max-width: 680px;
    margin: 10px auto 80px;
    padding: 0 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 2px 12px;
    align-items: center;
    transition: border-color 0.15s;
  }
  .card:hover { border-color: var(--accent); }

  .field-name {
    font-weight: 600;
    font-size: 0.95rem;
    grid-column: 1; grid-row: 1;
  }
  .field-name mark {
    background: #d4edcc;
    color: var(--accent);
    border-radius: 2px;
    padding: 0 1px;
  }

  .field-meta {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    grid-column: 1; grid-row: 2;
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }

  .heading-badge {
    font-family: 'DM Mono', monospace;
    font-size: 1.25rem;
    font-weight: 500;
    color: var(--accent);
    grid-column: 2; grid-row: 1 / 3;
    text-align: right;
    white-space: nowrap;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 2px;
  }

  .heading-dir {
    font-size: 0.62rem;
    color: var(--muted);
    font-weight: 400;
  }

  .card-actions {
    grid-column: 1 / 3;
    display: flex;
    gap: 8px;
    margin-top: 6px;
    padding-top: 8px;
    border-top: 1px solid var(--border);
  }

  .btn-edit, .btn-delete {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.75rem;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 4px;
    cursor: pointer;
    border: 1px solid;
    transition: opacity 0.15s;
  }
  .btn-edit { background: var(--tag-bg); color: var(--accent); border-color: #b8d4b2; }
  .btn-delete { background: #fbeaea; color: var(--danger); border-color: #e8c0c0; }
  .btn-edit:hover, .btn-delete:hover { opacity: 0.75; }

  .custom-tag {
    background: var(--tag-bg);
    color: var(--accent);
    font-size: 0.62rem;
    font-weight: 600;
    padding: 1px 5px;
    border-radius: 3px;
    letter-spacing: 0.04em;
  }

  .empty-state {
    text-align: center;
    color: var(--muted);
    font-size: 0.85rem;
    padding: 50px 0;
    line-height: 2;
  }
  .empty-state .icon { font-size: 2.5rem; display: block; margin-bottom: 8px; opacity: 0.4; }

  /* ── Modal ── */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border-radius: 12px;
    padding: 24px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.18);
  }

  .modal h2 {
    font-size: 1.1rem;
    font-weight: 700;
    margin-bottom: 18px;
    color: var(--accent);
  }

  .form-group {
    margin-bottom: 14px;
  }

  .form-group label {
    display: block;
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--muted);
    margin-bottom: 5px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .form-group input {
    width: 100%;
    background: var(--bg);
    border: 1.5px solid var(--border);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    padding: 10px 12px;
    border-radius: 6px;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-group input:focus { border-color: var(--accent); }

  .modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 20px;
  }

  .btn-save {
    flex: 1;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 11px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 0.9rem;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .btn-save:hover { opacity: 0.85; }

  .btn-cancel {
    flex: 0 0 auto;
    background: none;
    color: var(--muted);
    border: 1.5px solid var(--border);
    border-radius: 6px;
    padding: 11px 16px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 0.9rem;
    cursor: pointer;
  }

  .error-msg {
    color: var(--danger);
    font-size: 0.78rem;
    margin-top: 6px;
    display: none;
  }

  /* ── Delete confirm ── */
  .confirm-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 300;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .confirm-overlay.open { display: flex; }

  .confirm-box {
    background: var(--surface);
    border-radius: 10px;
    padding: 22px;
    width: 100%;
    max-width: 340px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    text-align: center;
  }
  .confirm-box p { font-size: 0.92rem; line-height: 1.5; margin-bottom: 18px; }
  .confirm-box strong { color: var(--accent); }
  .confirm-btns { display: flex; gap: 10px; }
  .btn-confirm-del {
    flex: 1; background: var(--danger); color: #fff;
    border: none; border-radius: 6px; padding: 10px;
    font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 0.9rem; cursor: pointer;
  }
  .btn-confirm-cancel {
    flex: 1; background: none; color: var(--muted);
    border: 1.5px solid var(--border); border-radius: 6px; padding: 10px;
    font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 0.9rem; cursor: pointer;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>🌱 Field Heading Lookup</h1>
    <p id="headerCount">Loading...</p>
  </div>
  <button class="add-btn" onclick="openAddModal()">+ Add Field</button>
</div>

<div class="search-section">
  <div class="search-wrap">
    <input type="text" id="search" placeholder="Search field name…" autocomplete="off" autocorrect="off" spellcheck="false" autofocus>
    <button class="clear-btn" id="clearBtn" onclick="clearSearch()">✕</button>
  </div>
  <div class="stats" id="stats"></div>
</div>

<div class="results" id="results"></div>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2 id="modalTitle">Add New Field</h2>
    <div class="form-group">
      <label>Field Name</label>
      <input type="text" id="inputName" placeholder="e.g. Brown 24">
      <div class="error-msg" id="nameError">Field name is required.</div>
    </div>
    <div class="form-group">
      <label>Heading (°)</label>
      <input type="text" id="inputHeading" placeholder="e.g. 90">
      <div class="error-msg" id="headingError">Heading is required.</div>
    </div>
    <div class="form-group">
      <label>Date Planted</label>
      <input type="date" id="inputDate">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveField()">Save Field</button>
    </div>
  </div>
</div>

<!-- Delete Confirm -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <p>Delete <strong id="confirmName"></strong>? This cannot be undone.</p>
    <div class="confirm-btns">
      <button class="btn-confirm-cancel" onclick="closeConfirm()">Cancel</button>
      <button class="btn-confirm-del" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>

const STORAGE_KEY = 'fieldHeadings_v1';
let editingIndex = null;
let deleteIndex  = null;

// ── Load / save ──
function loadData() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    return saved ? JSON.parse(saved) : JSON.parse(JSON.stringify(SEED));
  } catch(e) { return JSON.parse(JSON.stringify(SEED)); }
}

function saveData(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

let DATA = loadData();

// ── Helpers ──
function dirLabel(deg) {
  const n = parseFloat(deg);
  if (isNaN(n)) return '';
  return ['N','NE','E','SE','S','SW','W','NW'][Math.round(n/45)%8];
}

function hl(text, q) {
  if (!q) return text;
  return text.replace(new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'), m=>`<mark>${m}</mark>`);
}

// ── Render ──
function render() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  document.getElementById('clearBtn').style.display = q ? 'block' : 'none';
  document.getElementById('headerCount').textContent = `${DATA.length} fields · 2017–2025`;

  const matches = q ? DATA.filter(d => d.field_name.toLowerCase().includes(q)) : [];

  if (!q) {
    document.getElementById('stats').textContent = '';
    document.getElementById('results').innerHTML = `<div class="empty-state"><span class="icon">🌾</span>Type a field name to search.<br>Tap <strong>+ Add Field</strong> to add a new entry.</div>`;
    return;
  }

  document.getElementById('stats').textContent = matches.length ? `${matches.length} result${matches.length!==1?'s':''} found` : '';

  if (!matches.length) {
    document.getElementById('results').innerHTML = `<div class="empty-state"><span class="icon">🔍</span>No fields match "${q}".<br>Tap <strong>+ Add Field</strong> to add it.</div>`;
    return;
  }

  document.getElementById('results').innerHTML = matches.map(d => {
    const idx = DATA.indexOf(d);
    const isCustom = idx >= SEED.length;
    const dir = dirLabel(d.heading);
    const headingStr = d.heading !== '' && d.heading !== null ? `${d.heading}°` : '—';
    return `<div class="card">
      <div class="field-name">${hl(d.field_name, q)}${isCustom ? ' <span class="custom-tag">NEW</span>' : ''}</div>
      <div class="field-meta"><span>${d.date || '—'}</span></div>
      <div class="heading-badge">${headingStr}<span class="heading-dir">${dir}</span></div>
      <div class="card-actions">
        <button class="btn-edit" onclick="openEditModal(${idx})">✏️ Edit</button>
        <button class="btn-delete" onclick="openDeleteConfirm(${idx})">🗑 Delete</button>
      </div>
    </div>`;
  }).join('');
}

// ── Search ──
document.getElementById('search').addEventListener('input', render);
function clearSearch() {
  document.getElementById('search').value = '';
  document.getElementById('search').focus();
  render();
}

// ── Modal ──
function openAddModal() {
  editingIndex = null;
  document.getElementById('modalTitle').textContent = 'Add New Field';
  document.getElementById('inputName').value = '';
  document.getElementById('inputHeading').value = '';
  document.getElementById('inputDate').value = new Date().toISOString().split('T')[0];
  document.getElementById('nameError').style.display = 'none';
  document.getElementById('headingError').style.display = 'none';
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(() => document.getElementById('inputName').focus(), 100);
}

function openEditModal(idx) {
  editingIndex = idx;
  const d = DATA[idx];
  document.getElementById('modalTitle').textContent = 'Edit Field';
  document.getElementById('inputName').value = d.field_name;
  document.getElementById('inputHeading').value = d.heading;
  document.getElementById('inputDate').value = d.date || '';
  document.getElementById('nameError').style.display = 'none';
  document.getElementById('headingError').style.display = 'none';
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(() => document.getElementById('inputName').focus(), 100);
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

function saveField() {
  const name    = document.getElementById('inputName').value.trim();
  const heading = document.getElementById('inputHeading').value.trim();
  const date    = document.getElementById('inputDate').value;
  let valid = true;

  if (!name) { document.getElementById('nameError').style.display = 'block'; valid = false; }
  else { document.getElementById('nameError').style.display = 'none'; }

  if (!heading) { document.getElementById('headingError').style.display = 'block'; valid = false; }
  else { document.getElementById('headingError').style.display = 'none'; }

  if (!valid) return;

  if (editingIndex !== null) {
    DATA[editingIndex] = { field_name: name, date: date || null, heading };
  } else {
    DATA.push({ field_name: name, date: date || null, heading });
  }

  saveData(DATA);
  closeModal();
  render();
}

// ── Delete ──
function openDeleteConfirm(idx) {
  deleteIndex = idx;
  document.getElementById('confirmName').textContent = DATA[idx].field_name;
  document.getElementById('confirmOverlay').classList.add('open');
}

function closeConfirm() {
  document.getElementById('confirmOverlay').classList.remove('open');
}

function confirmDelete() {
  if (deleteIndex !== null) {
    DATA.splice(deleteIndex, 1);
    saveData(DATA);
    deleteIndex = null;
  }
  closeConfirm();
  render();
}

// Close modals on overlay click
document.getElementById('modalOverlay').addEventListener('click', e => { if(e.target===e.currentTarget) closeModal(); });
document.getElementById('confirmOverlay').addEventListener('click', e => { if(e.target===e.currentTarget) closeConfirm(); });

// Enter key in modal
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('modalOverlay').classList.contains('open')) saveField();
  if (e.key === 'Escape') { closeModal(); closeConfirm(); }
});

render();
</script>
